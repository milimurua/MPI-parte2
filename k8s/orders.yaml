apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      initContainers:
        - name: wait-for-catalog
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z catalog 50051; do
                echo "Waiting for Catalog gRPC...";
                sleep 2;
              done
        - name: wait-for-rabbitmq
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              until nc -z rabbitmq 5672; do
                echo "Waiting for RabbitMQ...";
                sleep 2;
              done
      containers:
        - name: orders
          image: marketplace/orders:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: CATALOG_GRPC_ADDR
              value: catalog.marketplace.svc.cluster.local:50051
            - name: RABBIT_URL
              value: "amqp://guest:guest@rabbitmq.marketplace.svc.cluster.local:5672/"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8000
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8000
          #   initialDelaySeconds: 5
          #   periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: marketplace
spec:
  selector:
    app: orders
  ports:
    - name: http
      port: 8000
      targetPort: 8000